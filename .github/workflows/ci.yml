name: CI

on:
  push:
    paths:
    - 'dockerfiles/**'
    - 'scripts/deploy.py'
    - 'scripts/create-layer.sh'
    - 'tests/*'
    - '.github/workflows/ci.yml'
    branches:
    - master
    tags:
    - '*'
  pull_request:
  workflow_dispatch:

env:
  GDAL_VERSION_TAG: 3.13

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 click

      - name: Load shared library versions
        id: versions
        run: |
          {
            echo 'content<<EOF'
            grep -v '^#' versions.env | grep -v '^[[:space:]]*$'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.arch }}
          context: .
          load: true
          file: dockerfiles/Dockerfile
          build-args: ${{ steps.versions.outputs.content }}
          tags: ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Test
        run: |
          docker run \
            --entrypoint bash \
            -v ${{ github.workspace }}:/local \
            --rm ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-${{ matrix.arch }} \
            /local/tests/tests.sh

  deploy-gdal:
    needs: [build]
    if: contains(github.ref, 'tags') && github.event_name == 'push'
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Load shared library versions
        id: versions
        run: |
          {
            echo 'content<<EOF'
            grep -v '^#' versions.env | grep -v '^[[:space:]]*$'
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish docker image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.arch }}
          context: .
          file: dockerfiles/Dockerfile
          build-args: ${{ steps.versions.outputs.content }}
          push: true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-${{ matrix.arch }}

  deploy-gdal-manifest:
    needs: [deploy-gdal]
    runs-on: ubuntu-24.04
    if: contains(github.ref, 'tags') && github.event_name == 'push'
    steps:
      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }} \
            ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-arm64

  deploy-layers:
    needs: [deploy-gdal]
    if: contains(github.ref, 'tags') && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - arch: amd64
            lambda_arch: x86_64
            runner: ubuntu-24.04
          - arch: arm64
            lambda_arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Build and Deploy layer (${{ matrix.arch }})
        run: |
          python -m pip install boto3 click
          docker run \
            --entrypoint bash \
            -e OUTPUT_ZIP=package-${{ matrix.arch }}.zip \
            -v ${{ github.workspace }}:/local \
            --rm ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-${{ matrix.arch }} \
            /local/scripts/create-layer.sh
          python scripts/deploy.py ${{ env.GDAL_VERSION_TAG }} --arch ${{ matrix.lambda_arch }} --package package-${{ matrix.arch }}.zip --deploy

  deploy-runtime:
    needs: [deploy-gdal]
    if: contains(github.ref, 'tags') && github.event_name == 'push'
    strategy:
      matrix:
        runtime: ['3.12', '3.13']
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image (python${{ matrix.runtime }}, ${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          platforms: linux/${{ matrix.arch }}
          context: .
          file: dockerfiles/runtimes/python
          build-args: |
            GDAL_VERSION_TAG=${{ env.GDAL_VERSION_TAG }}-${{ matrix.arch }}
            RUNTIME_VERSION=${{ matrix.runtime }}
            NUMPY_VERSION=2.4.2
            PKG_INSTALLER=dnf
          push: true
          cache-from: type=gha,scope=python${{ matrix.runtime }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=python${{ matrix.runtime }}-${{ matrix.arch }}
          tags: ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-python${{ matrix.runtime }}-${{ matrix.arch }}

  deploy-runtime-manifest:
    needs: [deploy-runtime]
    runs-on: ubuntu-24.04
    if: contains(github.ref, 'tags') && github.event_name == 'push'
    strategy:
      matrix:
        runtime: ['3.12', '3.13']
    steps:
      - name: Login to Github
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest (python${{ matrix.runtime }})
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-python${{ matrix.runtime }} \
            ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-python${{ matrix.runtime }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/lambda-gdal:${{ env.GDAL_VERSION_TAG }}-python${{ matrix.runtime }}-arm64

  update-layer:
    needs: [deploy-layers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: List layers
        run: |
          python -m pip install boto3
          python scripts/list.py | jq > layer.json

      - name: Update resources
        uses: test-room-7/action-update-file@v2.1.0
        with:
            file-path: layer.json
            commit-msg: Update layer [skip ci]
            github-token: ${{ secrets.GITHUB_TOKEN }}
